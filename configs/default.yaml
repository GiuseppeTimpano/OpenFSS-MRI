# OpenFSS-MRI training config.
# Override by copying this file and passing --config <path> to train.py.

data:
  data_dir: data/datasets/CHAOS/processed/T1
  fold: 0
  n_folds: 4
  n_shot: 1
  batch_size: 1
  num_workers: 4
  # min foreground pixels required per training episode (original min_size filter)
  min_size: 200
  # GT labels to drop from the SSL training pool (original exclude_label; null = off).
  # Set to the fold's held-out test organ(s) for setting-1 experiments, e.g. [1, 4].
  exclude_label: null
  # GT label names; index order must match the label volume values (BG=0, ...).
  label_names: [BG, LIVER, RK, LK, SPLEEN]

model:
  # qnet | alpnet
  name: qnet

train:
  lr: 0.001
  align_weight: 1.0      # ignored for alpnet (fixed to 0.5)
  bg_loss_weight: 0.1    # qnet original: 0.1 | alpnet original: 0.05
  max_epochs: 30

test:
  supp_idx: 0        # which test scan is the support (0 = first in sorted list)
  n_part: 3          # support slices selected + query chunks (original Q-Net default)
  test_label: null   # null = evaluate all non-BG classes; or e.g. [1, 4]
  save_preds: false  # if true, also write binary pred nii.gz (pass --save_dir on CLI)

# Cross-domain TEST (optional): train on source domain, test on target domain
# (like Q-Net trained on MRI T1 then tested on T2). Used by the volumetric test
# script, NOT during training. Leave domain_map null to disable.
domain:
  domain_map: null       # path to JSON: {"scan_id": "domain_label", ...}
  source_domain: null
  target_domain: null
