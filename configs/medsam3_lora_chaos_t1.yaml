# SAM3 LoRA training on CHAOS T1 (COCO-converted via scripts/medsam3_lora/build_coco_dataset.py),
# for third_party/MedSAM3/train_sam3_lora_native.py. Same LoRA hyperparams as
# upstream's configs/full_lora_config.yaml; only data_dir/output_dir point at
# this project's converted dataset instead of a generic COCO folder.
#
# Run from repo root (script's own dir is auto-added to sys.path, so no
# PYTHONPATH juggling needed for its `from lora_layers import ...`):
#   .venv/bin/python third_party/MedSAM3/train_sam3_lora_native.py \
#       --config configs/medsam3_lora_chaos_t1.yaml --device 0

model:
  name: "facebook/sam3"
  cache_dir: null

lora:
  rank: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "out_proj"
    - "qkv"
    - "proj"
    - "fc1"
    - "fc2"
    - "c_fc"
    - "c_proj"
    - "linear1"
    - "linear2"
  apply_to_vision_encoder: true
  apply_to_text_encoder: true
  apply_to_geometry_encoder: true
  apply_to_detr_encoder: true
  apply_to_detr_decoder: true
  apply_to_mask_decoder: true

training:
  data_dir: "data/datasets/CHAOS_coco/T1"   # scripts/medsam3_lora/build_coco_dataset.py output (train/ + valid/)
  batch_size: 4
  num_workers: 2

  learning_rate: 5e-5
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1e-8
  max_grad_norm: 1.0

  num_epochs: 50            # small dataset (~16 patients) -- watch val loss, no auto early-stop, cut short if it overfits
  warmup_steps: 100
  lr_scheduler: "cosine"

  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 5

  mixed_precision: "bf16"
  seed: 42
  gradient_accumulation_steps: 4  # effective batch 16

output:
  output_dir: "outputs/medsam3_lora_chaos_t1"
  logging_dir: "outputs/medsam3_lora_chaos_t1/logs"
  save_lora_only: true
  push_to_hub: false
  hub_model_id: null

evaluation:
  metric: "iou"
  save_predictions: false
  compute_metrics_during_training: true

hardware:
  device: "cuda"
  dataloader_pin_memory: true
  use_compile: false
