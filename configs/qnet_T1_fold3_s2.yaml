# QNET | T1 | fold 3 | Setting 2
# Setting 2: slices with Liver+Spleen removed from SSL pool

data:
  data_dir: data/datasets/CHAOS/processed/T1
  fold: 3
  n_folds: 4
  n_shot: 1
  batch_size: 1
  num_workers: 4
  min_size: 200
  exclude_label: [1, 4]
  label_names: [BG, LIVER, RK, LK, SPLEEN]

model:
  name: qnet

train:
  lr: 0.001
  lr_gamma: 0.95
  align_weight: 1.0
  bg_loss_weight: 0.1
  max_epochs: 30

test:
  supp_idx: 0
  n_part: 3
  test_label: null
  save_preds: false

domain:
  domain_map: null
  source_domain: null
  target_domain: null
